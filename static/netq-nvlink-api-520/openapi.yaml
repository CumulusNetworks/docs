        - bring-up has finished successfully, this is a terminal state
    Address:
      type: string
      description: Switch IP address (IPv4 or Hostname)
      minLength: 1
      maxLength: 253
      oneOf:
        - format: ipv4
        - format: hostname
    SwitchInfo:
      type: object
      properties:
        StartedAt:
          $ref: '#/components/schemas/Timestamp'
        UpdatedAt:
          $ref: '#/components/schemas/Timestamp'
        Status:
          $ref: '#/components/schemas/Status'
        StatusDetails:
          type: string
          description: Human-readable details of the bring-up status
        CurrentStep:
          type: string
          description: Human-readable description of the current step of execution in the bring-up process
        Address:
          $ref: '#/components/schemas/Address'
        NMX-Telemetry-ID:
          $ref: '#/components/schemas/EntityID'
        NMX-Controller-ID:
          $ref: '#/components/schemas/EntityID'
      required:
        - Status
        - StatusDetails
        - Address
      additionalProperties: false
    BringUpReport:
      type: object
      properties:
        ID:
          $ref: '#/components/schemas/EntityID'
        CreatedAt:
          $ref: '#/components/schemas/Timestamp'
        UpdatedAt:
          $ref: '#/components/schemas/Timestamp'
        Status:
          $ref: '#/components/schemas/Status'
        Switches:
          type: array
          uniqueItems: true
          items:
            $ref: '#/components/schemas/SwitchInfo'
      required:
        - ID
        - CreatedAt
        - UpdatedAt
        - Status
        - Switches
      additionalProperties: false
    SwitchRequest:
      type: object
      properties:
        Address:
          $ref: '#/components/schemas/Address'
        ProfileID:
          $ref: '#/components/schemas/EntityID'
      required:
        - Address
      additionalProperties: false
    Switches:
      type: array
      uniqueItems: true
      minItems: 1
      items:
        $ref: '#/components/schemas/SwitchRequest'
      additionalProperties: false
    CreateBringUpRequest:
      type: object
      properties:
        FmConfig:
          type: string
          format: binary
          description: FmConfig file. Size limit 1MB.
          x-go-type: '*multipart.FileHeader'
        CertP12:
          type: string
          format: binary
          description: 'P12 certificate bundle (.p12) for switch TLS.<br><br>● cert-mode = "self-signed": Do NOT provide this field (certificates are auto-generated).<br>● cert-mode = "user-cert": REQUIRED — upload your .p12 certificate bundle.<br><br>The system will reject the request if the field presence doesn''t match the active cert-mode.'
          x-go-type: '*multipart.FileHeader'
        ProfileID:
          $ref: '#/components/schemas/EntityID'
        Switches:
          $ref: '#/components/schemas/Switches'
      required:
        - Switches
        - FmConfig
      additionalProperties: false
    SwitchProfile:
      type: object
      properties:
        ID:
          $ref: '#/components/schemas/EntityID'
        Name:
          description: Name of the switch profile.
          example: Example custom profile
          type: string
          pattern: ^[\x20-\x7E]*$
          minLength: 1
          maxLength: 64
      required:
        - ID
        - Name
    CreateSwitchProfileRequest:
      type: object
      properties:
        Name:
          description: Name of the switch profile.
          example: Example custom profile
          type: string
          pattern: ^[\x20-\x7E]*$
          minLength: 1
          maxLength: 64
        Username:
          description: Username to connect to a switch (encrypted).
          example: User12356
          type: string
          format: password
          pattern: ^[\x20-\x7E]*$
          minLength: 1
          maxLength: 64
        Password:
          description: Password to connect to a switch (encrypted).
          example: Password12356
          type: string
          format: password
          pattern: ^[\x20-\x7E]*$
          minLength: 1
          maxLength: 64
      required:
        - Name
        - Username
        - Password
    UpdateSwitchProfileRequest:
      type: object
      properties:
        Name:
          description: Name of the switch profile.
          example: Updated custom profile
          type: string
          pattern: ^[\x20-\x7E]*$
          minLength: 1
          maxLength: 64
        Username:
          description: Username to connect to a switch (encrypted).
          example: User12356
          type: string
          format: password
          pattern: ^[\x20-\x7E]*$
          minLength: 1
          maxLength: 64
        Password:
          description: Password to connect to a switch (encrypted).
          example: Password12356
          type: string
          format: password
          pattern: ^[\x20-\x7E]*$
          minLength: 1
          maxLength: 64
      minProperties: 1
    SupportPackageMetadata:
      type: object
      description: Metadata of a support package file.
      properties:
        fileID:
          $ref: '#/components/schemas/EntityID'
        filename:
          type: string
          example: support-logs-2025-05-08.tar.gz
        size:
          type: integer
          format: int64
          description: File size in bytes
          example: 1048576
          x-go-name: length
        uploadDate:
          $ref: '#/components/schemas/Timestamp'
        switchAddress:
          type: string
        domainID:
          $ref: '#/components/schemas/EntityID'
      required:
        - fileID
        - filename
        - size
        - uploadDate
        - switchAddress
      additionalProperties: false
    CreateSupportPackageRequest:
      type: object
      description: Request to create a support package. Either Switches or Domains must be provided, but not both.
      properties:
        ProfileID:
          $ref: '#/components/schemas/EntityID'
        Switches:
          $ref: '#/components/schemas/Switches'
        Domains:
          type: array
          items:
            $ref: '#/components/schemas/EntityID'
          minItems: 1
      additionalProperties: false
    ImageType:
      type: string
      description: Type of the image
      enum:
        - nvos
        - cpld
      x-enum-varnames:
        - NVOS
        - CPLD
      default: nvos
      example: nvos
    ImageMetadata:
      type: object
      description: Metadata of an image file.
      properties:
        imageID:
          $ref: '#/components/schemas/EntityID'
        filename:
          type: string
          example: firmware-update-v1.2.3.img
        size:
          type: integer
          format: int64
          description: File size in bytes
          example: 1048576
          x-go-name: length
        uploadDate:
          $ref: '#/components/schemas/Timestamp'
        name:
          type: string
          description: Optional name of the image
        version:
          type: string
          description: Optional version of the image
        imageType:
          $ref: '#/components/schemas/ImageType'
      required:
        - imageID
        - filename
        - size
        - uploadDate
        - imageType
      additionalProperties: false
    UploadImageRequest:
      type: object
      properties:
        File:
          type: string
          format: binary
          description: The image file to upload
          maxLength: 4294967296
          x-go-type: '*multipart.FileHeader'
        Filename:
          type: string
          description: Optional filename override
          maxLength: 255
        Name:
          type: string
          description: Optional name of the image
          maxLength: 255
        Version:
          type: string
          description: Optional version of the image
          maxLength: 255
        ImageType:
          $ref: '#/components/schemas/ImageType'
          description: Optional type of the image for better clarity
      required:
        - File
      additionalProperties: false
    SwitchUpgradeRequest:
      type: object
      description: Individual switch upgrade configuration
      properties:
        Address:
          $ref: '#/components/schemas/Address'
        ProfileID:
          $ref: '#/components/schemas/EntityID'
        ImageID:
          $ref: '#/components/schemas/EntityID'
      required:
        - Address
      additionalProperties: false
    SwitchUpgradeList:
      type: array
      uniqueItems: true
      minItems: 1
      items:
        $ref: '#/components/schemas/SwitchUpgradeRequest'
    DomainUpgradeRequest:
      type: object
      description: Individual domain upgrade configuration
      properties:
        DomainID:
          $ref: '#/components/schemas/EntityID'
        ImageID:
          $ref: '#/components/schemas/EntityID'
      required:
        - DomainID
      additionalProperties: false
    DomainUpgradeList:
      type: array
      uniqueItems: true
      minItems: 1
      items:
        $ref: '#/components/schemas/DomainUpgradeRequest'
    CreateSwitchUpgradeRequest:
      type: object
      description: |
        Request to upgrade switches with a new NVOS/Firmware image.
        Either Switches or Domains must be provided, but not both.
        Make sure the image type matches the upgrade type.
      properties:
        UpgradeType:
          $ref: '#/components/schemas/ImageType'
        ProfileID:
          $ref: '#/components/schemas/EntityID'
        ImageID:
          $ref: '#/components/schemas/EntityID'
        Switches:
          $ref: '#/components/schemas/SwitchUpgradeList'
        Domains:
          $ref: '#/components/schemas/DomainUpgradeList'
      additionalProperties: false
    RedfishEndpoint:
      type: object
      properties:
        CreatedAt:
          $ref: '#/components/schemas/Timestamp'
        UpdatedAt:
          $ref: '#/components/schemas/Timestamp'
        ID:
          $ref: '#/components/schemas/EntityID'
        Address:
          $ref: '#/components/schemas/Address'
        PortNumber:
          $ref: '#/components/schemas/PortNumber'
        ProfileID:
          $ref: '#/components/schemas/EntityID'
        SubscriptionStatus:
          type: string
          enum:
            - active
            - failed
            - disconnected
            - cancelled
            - pending
            - unauthorized
            - timeout
          x-enum-varnames:
            - Active
            - Failed
            - Disconnected
            - Cancelled
            - Pending
            - Unauthorized
            - Timeout
          description: |
            Redfish subscription status:
            - active: Subscription is active (HTTP 200 OK)
            - disconnected: BMC is not reachable (connection error)
            - cancelled: Subscription was deleted (HTTP 404)
            - pending: Subscription is being created
            - unauthorized: Credentials are invalid or revoked (HTTP 401/403). Events might still be delivered but it's not guaranteed, credentials must be updated.
            - timeout: BMC is unreachable due to timeout
        DeviceType:
          type: string
          enum:
            - switch
            - gpu
          x-enum-varnames:
            - Switch
            - GPU
          description: Type of the Redfish device
        DeviceUID:
          type: integer
          format: uint64
          description: Unique identifier of the device
      required:
        - ID
        - CreatedAt
        - UpdatedAt
        - Address
        - ProfileID
      additionalProperties: false
    RedfishEndpointRequest:
      type: object
      properties:
        Address:
          $ref: '#/components/schemas/Address'
        PortNumber:
          $ref: '#/components/schemas/PortNumber'
        ProfileID:
          $ref: '#/components/schemas/EntityID'
      required:
        - Address
      additionalProperties: false
    RedfishEndpoints:
      type: array
      uniqueItems: true
      minItems: 1
      items:
        $ref: '#/components/schemas/RedfishEndpointRequest'
      additionalProperties: false
    CreateRedfishEndpointRequest:
      type: object
      properties:
        ProfileID:
          $ref: '#/components/schemas/EntityID'
        Endpoints:
          $ref: '#/components/schemas/RedfishEndpoints'
      required:
        - Endpoints
      additionalProperties: false
  responses:
    Error500:
      description: An unexpected internal server error occurred.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            httpErrorCode: 500
            customErrorCode: internal-error
            description: An unexpected internal error occurred.
    Error400:
      description: The request was invalid or malformed.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            httpErrorCode: 400
            customErrorCode: bad-request
            description: The request body or parameters are invalid.
    Error404:
      description: The requested resource was not found.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            httpErrorCode: 404
            customErrorCode: not-found
            description: The requested resource was not found.
    Error409:
      description: The request conflicts with the current state of the resource.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            httpErrorCode: 409
            customErrorCode: conflict
            description: The request conflicts with the current state of the resource.
    Error503:
      description: The service is currently unavailable.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            httpErrorCode: 503
            customErrorCode: service-unavailable
            description: The service is currently unavailable.
    Error403:
      description: The request is forbidden as per the current system configuration or policy.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            httpErrorCode: 403
            customErrorCode: not-allowed
            description: The request is forbidden.
    OperationResponse:
      description: A general response structure describing an NMX-M long-running async operation with a trackable op-id.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/AsyncResponse'
    Error405:
      description: The HTTP method is not allowed for this resource.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            httpErrorCode: 405
            customErrorCode: method-not-allowed
            description: The HTTP method is not allowed for this resource.
    Error413:
      description: The request payload exceeds the maximum allowed size.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            httpErrorCode: 413
            customErrorCode: payload-too-large
            description: The request payload exceeds the maximum allowed size.
  parameters:
    IdParam:
      name: id
      in: path
      required: true
      schema:
        $ref: '#/components/schemas/EntityID'
    DomainParam:
      in: query
      name: domain
      required: false
      schema:
        type: string
        format: uuid
        pattern: ^[0-9a-fA-F]{8}-[0-9a-fA-F]{4}-4[0-9a-fA-F]{3}-[89abAB][0-9a-fA-F]{3}-[0-9a-fA-F]{12}$
    FromParam:
      in: query
      name: from
      required: false
      description: 'Start time, format: YYYY-MM-DDThh:mm:ssZ'
      schema:
        type: string
        format: date-time
    ToParam:
      in: query
      name: to
      required: false
      description: 'End time, format: YYYY-MM-DDThh:mm:ssZ'
      schema:
        type: string
        format: date-time