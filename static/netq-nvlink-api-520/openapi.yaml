  /switches/count:
    get:
      tags:
        - NetworkEntity
      summary: Get total count of Switches
      operationId: GetSwitchesCount
      parameters:
        - in: query
          name: domain
          schema:
            type: array
            description: Domain UUID list
            items:
              $ref: '#/components/schemas/UUID'
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NetworkEntityCountResponse'
        '500':
