  /upgrade-switch:
    post:
      tags:
        - SwitchUpgrade
      summary: Upgrade switches with new NVOS/Firmware image
      operationId: CreateSwitchUpgrade
      description: |
        Creates an asynchronous operation for upgrading switches with new NVOS/Firmware version.
        Supports two mutually exclusive request formats:
                1. Standard format with explicit switches list
                2. Domain-based format with domain UUIDs mapping to image IDs
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateSwitchUpgradeRequest'
            examples:
              switchBased:
                summary: Switch-based NVOS upgrade
                value:
                  UpgradeType: nvos
                  ProfileID: 551137c2f9e1fac808a5f572
                  ImageID: 551137c2f9e1fac808a5f572
                  Switches:
                    - Address: 10.0.0.1
                      ProfileID: 551137c2f9e1fac808a5f572
                      ImageID: 551137c2f9e1fac808a5f572
              domainBased:
                summary: Domain-based NVOS upgrade
                value:
                  UpgradeType: nvos
                  ImageID: 551137c2f9e1fac808a5f572
                  Domains:
                    - DomainID: 551137c2f9e1fac808a5f572
                      ImageID: 551137c2f9e1fac808a5f572
              cpldSwitchUpgrade:
                summary: Switch-based CPLD firmware upgrade
                value:
                  UpgradeType: cpld
                  ProfileID: 551137c2f9e1fac808a5f572
                  ImageID: 551137c2f9e1fac808a5f572
                  Switches:
                    - Address: 10.0.0.1
                      ProfileID: 551137c2f9e1fac808a5f572
                      ImageID: 551137c2f9e1fac808a5f572
              cpldDomainUpgrade:
                summary: Domain-based CPLD firmware upgrade
                value:
                  UpgradeType: cpld
                  ImageID: 551137c2f9e1fac808a5f572
                  Domains:
                    - DomainID: 551137c2f9e1fac808a5f572
                      ImageID: 551137c2f9e1fac808a5f572
      responses:
        '202':
          $ref: '#/components/responses/OperationResponse'
        '400':
          $ref: '#/components/responses/Error400'
        '404':
          $ref: '#/components/responses/Error404'
        '409':
          $ref: '#/components/responses/Error409'
        '500':
          $ref: '#/components/responses/Error500'
  /validations/fw-versions:
    get:
      tags:
        - Validations
      summary: Get firmware version validation results
      description: |
        Returns firmware version validation results for all domains, or for specific domains
        when one or more domain query parameters are provided.
      operationId: GetFWVersionsValidation
      parameters:
        - in: query
          name: domain
          description: Domain UUID(s) to filter by
          required: false
          schema:
            type: array
            items:
              $ref: '#/components/schemas/UUID'
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/FWVersionValidationItem'
        '400':
          $ref: '#/components/responses/Error400'
        '500':
          $ref: '#/components/responses/Error500'
  /version:
    get:
      tags:
        - Version
      summary: Get NetQ version
      description: Returns the NetQ version
      operationId: getVersion
      responses:
        '200':
          description: NetQ version
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VersionResponse'
        '500':
          $ref: '#/components/responses/Error500'
components:
  schemas:
    VersionResponse:
      type: object
      additionalProperties: false
      required:
        - version
      properties:
        version:
          type: string
          description: NetQ version
          example: 5.2.0
    Error:
      description: NMX-M Error Information
      type: object
      x-go-type: liberr.Error
      x-go-type-import:
        path: gitlab-master.nvidia.com/nbu-sws/nmx/manager-app/lib/errors
        name: liberr
      properties:
        httpErrorCode:
          type: integer
          example: 500
          description: HTTP error code
        customErrorCode:
          type: string
          example: internal-error
          description: A more granular, textual custom error code
        description:
          type: string
          example: 'Something really bad happened with resource [id: 123] and we are so sorry about it.'
          description: A detailed error description
      required:
        - httpErrorCode
        - customErrorCode
        - description
      additionalProperties: false
    UUID:
      type: string
      format: uuid
      description: Universally Unique Identifier.
    NmxServiceType:
      type: string
      enum:
        - TELEMETRY
        - CONTROLLER
      x-enum-varnames:
        - NmxServiceTypeTelemetry
        - NmxServiceTypeController
    IPAddress:
      description: IPv4 address mask.
      example: 1.1.1.1
      type: string
      format: ipv4
    Pagination:
      type: object
      additionalProperties: false
      properties:
        offset:
          description: Start offset of the results
          type: integer
          default: 0
          minimum: 0
        limit:
          description: Items per page
          type: integer
          minimum: 1
    EntityID:
      type: string
      example: 551137c2f9e1fac808a5f572
      pattern: ^[0-9a-fA-F]{24}$
      description: System unique identifier.
    PortNumber:
      type: integer
      minimum: 0
      maximum: 65535
      example: 8001
    NmxServiceStatus:
      type: string
      enum:
        - UP
        - DRAINING
        - REMOVED
        - DOWN
        - RECONNECTING
        - UNREACHABLE
        - IN_PROGRESS
        - ERROR
      x-enum-varnames:
        - NmxServiceStatusUp
        - NmxServiceStatusDraining
        - NmxServiceStatusRemoved
        - NmxServiceStatusDown
        - NmxServiceStatusReconnecting
        - NmxServiceStatusUnreachable
        - NmxServiceStatusInProgress
        - NmxServiceStatusError
    Timestamp:
      type: string
      format: date-time
    NmxService:
      type: object
      additionalProperties: false
      properties:
        ID:
          $ref: '#/components/schemas/EntityID'
        Name:
          type: string
          description: Name of the service.
        Description:
          type: string
          description: Description of the service.
        ServiceType:
          $ref: '#/components/schemas/NmxServiceType'
        Address:
          $ref: '#/components/schemas/IPAddress'
        PortNumber:
          $ref: '#/components/schemas/PortNumber'
        ClusterDomainUUID:
          $ref: '#/components/schemas/UUID'
        ApplicationUUID:
          $ref: '#/components/schemas/UUID'
        Version:
          type: string
          description: Version of the service.
        Status:
          $ref: '#/components/schemas/NmxServiceStatus'
        StatusInfo:
          type: string
          description: Additional information about the status.
        RegisteredAt:
          $ref: '#/components/schemas/Timestamp'
        UpSince:
          $ref: '#/components/schemas/Timestamp'
    NmxServiceConnectionInformation:
      type: object
      additionalProperties: false
      required:
        - Address
        - PortNumber
      properties:
        Address:
          $ref: '#/components/schemas/IPAddress'
        PortNumber:
          $ref: '#/components/schemas/PortNumber'
    AddNmxServiceRequest:
      type: object
      additionalProperties: false
      required:
        - Name
        - ServiceType
        - ServiceConnectionInformation
      properties:
        Name:
          type: string
          maxLength: 64
          minLength: 1
          pattern: ^[\x20-\x7E]*$
          example: Some-Name
        Description:
          type: string
          maxLength: 2000
          pattern: ^[\x20-\x7E]*$
          example: This is a description.
        ServiceType:
          $ref: '#/components/schemas/NmxServiceType'
        ServiceConnectionInformation:
          $ref: '#/components/schemas/NmxServiceConnectionInformation'
    FailoverEvent:
      type: object
      description: Record of a single failover event
      properties:
        timestamp:
          $ref: '#/components/schemas/Timestamp'
        fromIP:
          type: string
          description: IP address before failover
          example: 127.0.0.1
        toIP:
          type: string
          description: IP address after failover
          example: 127.0.0.2
        reason:
          type: string
          description: Reason for failover
          example: connection_failure
        success:
          type: boolean
          description: Whether the failover was successful
          example: true
        duration:
          type: integer
          format: int64
          description: Duration of failover in milliseconds
          example: 5
        errorMessage:
          type: string
          description: Error message if failover failed
          example: TCP connectivity test failed
      required:
        - timestamp
        - fromIP
        - toIP
        - reason
        - success
      additionalProperties: false
    ServiceConnectionStatus:
      type: object
      description: Connection status for a service including IP failover information
      properties:
        serviceId:
          $ref: '#/components/schemas/EntityID'
        registrationIP:
          type: string
          description: Original registration IP address
          example: 127.0.0.1
        currentActiveIP:
          type: string
          description: Currently active IP address
          example: 127.0.0.2
        availableIPs:
          type: array
          items:
            type: string
          description: List of available IP addresses for this service
          example:
            - 127.0.0.1
            - 127.0.0.2
        connectionState:
          type: string
          enum:
            - connected
            - disconnected
            - failing_over
            - failed
          description: Current connection state
          example: connected
        failoverHistory:
          type: array
          items:
            $ref: '#/components/schemas/FailoverEvent'
          description: History of failover events
        lastUpdated:
          $ref: '#/components/schemas/Timestamp'
      required:
        - serviceId
        - registrationIP
        - currentActiveIP
        - connectionState
      additionalProperties: false
    ChassisID:
      description: The unique identifier of the chassis
      type: integer
    ChassisSerialNumber:
      description: The unique serial number of the chassis
      type: string
    SlotID:
      description: The unique identifier of the slot
      type: integer
      minimum: 0
    TrayIndex:
      description: Index of the compute/switch tray within the compute/switch trays group in the chassis, a number from 0
      type: integer
      minimum: 0
    HostID:
      description: The unique identifier of the host
      type: integer
      minimum: 0
    LocationInfo:
      type: object
      additionalProperties: false
      properties:
        ChassisID:
          $ref: '#/components/schemas/ChassisID'
        ChassisSerialNumber:
          $ref: '#/components/schemas/ChassisSerialNumber'
        SlotID:
          $ref: '#/components/schemas/SlotID'
        TrayIndex:
          $ref: '#/components/schemas/TrayIndex'
        HostID:
          $ref: '#/components/schemas/HostID'
    NodeSensor:
      type: object
      additionalProperties: false
      required:
        - URI
        - Status
        - Details
        - UpdatedAt
      properties:
        URI:
          type: string
          description: Sensor unique resource identifier
        Status:
          type: string
          description: Sensor status
        Details:
          type: string
          description: Sensor status details
        UpdatedAt:
          $ref: '#/components/schemas/Timestamp'
          summary: Last update time
    NodeSensorsMap:
      type: object
      additionalProperties:
        type: object
        additionalProperties:
          $ref: '#/components/schemas/NodeSensor'
    ComputeNode:
      type: object
      additionalProperties: false
      properties:
        ID:
          $ref: '#/components/schemas/EntityID'
        Name:
          type: string
          description: Helpful name
        Description:
          type: string
          description: Brief description
        Hostname:
          type: string
          description: Hostname of the compute tray
        CreatedAt:
          $ref: '#/components/schemas/Timestamp'
          description: Creation time
        UpdatedAt:
          $ref: '#/components/schemas/Timestamp'
          description: Last update time
        DomainUUID:
          $ref: '#/components/schemas/UUID'
          description: Domain UUID
        LocationInfo:
          $ref: '#/components/schemas/LocationInfo'
        Sensors:
          $ref: '#/components/schemas/NodeSensorsMap'
        GpuIDList:
          type: array
          items:
            $ref: '#/components/schemas/EntityID'
        Health:
          type: string
          enum:
            - UNKNOWN
            - HEALTHY
            - DEGRADED
            - UNHEALTHY
          x-enum-varnames:
            - ComputeNodeHealthUnknown
            - ComputeNodeHealthHealthy
            - ComputeNodeHealthDegraded
            - ComputeNodeHealthUnhealthy
    NetworkEntityCountResponse:
      type: object
      additionalProperties: false
      properties:
        total:
          type: integer
          format: int64
          description: Number of objects
    NetworkEntityUpdatePayload:
      type: object
      properties:
        Name:
          type: string
          minLength: 1
          maxLength: 64
          pattern: ^[\x20-\x7E]*$
          example: Some-Name
        Description:
          type: string
          maxLength: 2000
          pattern: ^[\x20-\x7E]*$
          example: This is a description.
      anyOf:
        - type: object
          required:
            - Name
        - type: object
          required:
            - Description
      additionalProperties: false
    AdminState:
      type: string
      enum:
        - UNKNOWN
        - UP
        - DOWN
        - DIAG
      x-enum-varnames:
        - AdminStateUnknown
        - AdminStateUp
        - AdminStateDown
        - AdminStateDiag
    IPInfo:
      type: object
      properties:
        IP:
          type: string
          description: IPv4 or IPv6 address
        Netmask:
          type: string
          description: Network mask (IPv4) or prefix length (IPv6)
    FWVersions:
      type: object
      properties:
        ASIC:
          type: string
          description: ASIC firmware version
        BIOS:
          type: string
          description: BIOS firmware version
        BMC:
          type: string
          description: BMC firmware version
        CPLD1:
          type: string
          description: CPLD1 firmware version
        CPLD2:
          type: string
          description: CPLD2 firmware version
        CPLD3:
          type: string
          description: CPLD3 firmware version
        CPLD4:
          type: string
          description: CPLD4 firmware version
        EROT:
          type: string
          description: EROT firmware version
        EROTASIC1:
          type: string
          description: EROT ASIC1 firmware version
        EROTASIC2:
          type: string
          description: EROT ASIC2 firmware version
        EROTBMC:
          type: string
          description: EROT BMC firmware version
        EROTCPU:
          type: string
          description: EROT CPU firmware version
        EROTFPGA:
          type: string
          description: EROT FPGA firmware version
        FPGA:
          type: string
          description: FPGA firmware version
        NVOS:
          type: string
          description: NVOS firmware version
    SwitchNode:
      type: object
      additionalProperties: false
      properties:
        ID:
          $ref: '#/components/schemas/EntityID'
        AdminState:
          $ref: '#/components/schemas/AdminState'
        Name:
          type: string
          summary: Helpful name
        Description:
          type: string
          summary: Brief description
        Hostname:
          type: string
          description: Hostname of the switch tray (extracted from switch telemetry)
        CreatedAt:
          $ref: '#/components/schemas/Timestamp'
          summary: Creation time
        UpdatedAt:
          $ref: '#/components/schemas/Timestamp'
          summary: Last update time
        DomainUUID:
          $ref: '#/components/schemas/UUID'
          summary: Domain UUID
        LocationInfo:
          $ref: '#/components/schemas/LocationInfo'
        Sensors:
          $ref: '#/components/schemas/NodeSensorsMap'
        Health:
          type: string
          enum:
            - UNKNOWN
            - HEALTHY
            - MISSING_NVLINK
            - UNHEALTHY
          x-enum-varnames:
            - SwitchNodeHealthUnknown
            - SwitchNodeHealthHealthy
            - SwitchNodeHealthMissingNvlink
            - SwitchNodeHealthUnhealthy
        SwitchIDList:
          type: array
          items:
            $ref: '#/components/schemas/EntityID'
        ProfileID:
          $ref: '#/components/schemas/EntityID'
          summary: Profile ID
        ManagementIPs:
          type: array
          items:
            $ref: '#/components/schemas/IPInfo'
          description: List of IP addresses with their netmasks
        FWVersions:
          $ref: '#/components/schemas/FWVersions'
    UpdateSwitchNodePayload:
      type: object
      properties:
        Name:
          type: string
          minLength: 1
          maxLength: 64
          pattern: ^[\x20-\x7E]*$
          example: Some-Name
        Description:
          type: string
          maxLength: 2000
          pattern: ^[\x20-\x7E]*$
          example: This is a description.
        ProfileID:
          $ref: '#/components/schemas/EntityID'
          summary: Profile ID
      anyOf:
        - type: object
          required:
            - Name
        - type: object
          required:
            - Description
        - type: object
          required:
            - ProfileID
      additionalProperties: false
    UpdateAdminStateRequest:
      type: object
      properties:
        admin-state:
          $ref: '#/components/schemas/AdminState'
      required:
        - admin-state
      additionalProperties: false
    AsyncResponse:
      description: NMX-M Asynchronous Operation ID
      type: object
      properties:
        operationId:
          type: string
          format: entity-db-id
          pattern: ^[0-9a-fA-F]{24}$
          example: 551137c2f9e1fac808a5f572
      required:
        - operationId
      additionalProperties: false
    PortType:
      type: string
      enum:
        - UNDEFINED
        - GPU
        - SWITCH_ACCESS
        - SWITCH_TRUNK
        - FNM
        - HCA
      x-enum-varnames:
        - PortTypeUndefined
        - PortTypeGPU
        - PortTypeSwitchAccess
        - PortTypeSwitchTrunk
        - PortTypeFNM
        - PortTypeHCA
    uint64:
      type: integer
      format: uint64
      minimum: 0
      maximum: 18446744073709552000
    uint32:
      type: integer
      format: uint32
      minimum: 0
      maximum: 4294967295
    PortPhysicalState:
      type: string
      enum:
        - NO_CHANGE
        - SLEEP
        - POLLING
        - DISABLED
        - PORTCONFTRAIN
        - LINKUP
        - LINKERRRECOVER
        - PHYTEST
      x-enum-varnames:
        - PortPhysicalStateNoChange
        - PortPhysicalStateSleep
        - PortPhysicalStatePolling
        - PortPhysicalStateDisabled
        - PortPhysicalStatePortConfTrain
        - PortPhysicalStateLinkUp
        - PortPhysicalStateLinkErrRecover
        - PortPhysicalStatePhyTest
    PortLogicalState:
      type: string
      enum:
        - NO_CHANGE
        - STATE_DOWN
        - STATE_INIT
        - STATE_ARMED
        - STATE_ACTIVE
        - STATE_ACT_DEFER
      x-enum-varnames:
        - PortLogicalStateNoChange
        - PortLogicalStateDown
        - PortLogicalStateInit
        - PortLogicalStateArmed
        - PortLogicalStateActive
        - PortLogicalStateActDefer
    Port:
      type: object
      additionalProperties: false
      required:
        - PortUID
        - PortNum
        - PeerPortDeviceUID
        - PortAdminState
        - PeerPortNum
